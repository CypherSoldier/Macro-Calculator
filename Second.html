<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="device-width-width, initial-scale=1">
    <title>Bodybuilding Macro Calculator</title>
    <link rel="stylesheet" href="Second.css">
    <body>
        <header>
            <nav id="navbar">
                <ul>
                    <li>
                        <a href="#workout_templates">Workout</a>
                    </li>
                    <li>
                        <a href="#transformations">Transformations</a>
                    </li>
                </ul>
            </nav>
        </header>

        <section id="calculator">
            <div class="page-title">Macro Calculator</div>
            <div class="page-subtitle">based on the Harris Benedict Formula</div>
            <div class="second-page-form">
                <h6>My activity level is...</h6>
                <div class="options">
                  <button class="pg2-buttons">
                    <span class="details">Sedentary</span>
                    <span class="sub-details">Little or no exercise</span>
                  </button>
                 </div>
              <div class="options">
                  <button class="pg2-buttons">
                    <span class="details">Lightly active</span>
                    <span class="sub-details">1-3 days a week</span>
                  </button>
                 </div>
              <div class="options">
                  <button class="pg2-buttons">
                    <span class="details">Moderately active</span>
                    <span class="sub-details">3-5 days a week</span>
                  </button>
                 </div>
              <div class="options">
                  <button class="pg2-buttons">
                    <span class="details">Very active</span>
                    <span class="sub-details">6-7 days a week</span>
                  </button>
                 </div>
              <div class="options">
                  <button class="pg2-buttons">
                    <span class="details">Extra active</span>
                    <span class="sub-details">Sports and physical job or 2x training</span>
                  </button>
                 </div>
              
               <div class="radio-form-item-1"><button class="button-next" type="button" onClick="myFunctionC()">Calculate</button></div>
               <div class="radio-form-item-2"><button class="button-next-2" type="button" onClick="myFunctionB()">Back</button></div>

               <script>
                function myFunctionB() {
                  window.location.href = "Webpage.html";
                }
                function myFunctionC() {
                  window.location.href = "Third.html";
                }

              </script>
            </div>
        </section>
    </body>
</html>
