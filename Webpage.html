<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="device-width-width, initial-scale=1">
    <title>Bodybuilding Macro Calculator</title>
    <link rel="stylesheet" href="Webpage_Styling.css">
    <body>
        <header>
            <nav id="navbar">
                <ul>
                    <li>
                        <a href="#workout_templates">Workout</a>
                    </li>
                    <li>
                        <a href="#transformations">Transformations</a>
                    </li>
                </ul>
            </nav>
        </header>

        <section id="calculator">
            <div class="page-title">Macro Calculator</div>
            <div class="page-subtitle">based on the Harris Benedict Formula</div>
            <div class="page-form">
                <h6>Gender</h6>
              <div class="male-female-row">
                <div class="radio-form-item"><button class="button" type="button">Female</button></div>
                <div class="radio-form-item"><button class="button" type="button">Male</button></div>
              </div>
              <div class="value">Age
            <input id="height" type="range" name="quantity" min="18" max="60">
            <output class="bubble"></output>
                </div>
              <div class="value">Height
            <input id="height" type="range" name="quantity" min="130" max="230">
            <output class="bubble"></output>
                </div>
              <div class="value">Weight
            <input id="height" type="range" name="quantity" min="40" max="180">
            <output class="bubble"></output>
                </div>
              
                <div class="radio-form-item-1"><button class="button-next" type="button" onClick="myFunction()">Next</button></div>
                <script>
                    function myFunction() {
                      window.location.href = "Second.html";
                    }
                  </script>
              
            </div>
        </section>
    </body>
</html>
