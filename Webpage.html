<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="device-width-width, initial-scale=1">
    <title>Bodybuilding Macro Calculator</title>
    <link rel="stylesheet" href="Webpage_Styling.css">
  </head>

    <body>
        <header>
            <nav id="navbar">
                <ul>
                    <li>
                        <a href="#workout_templates">Workout</a>
                    </li>
                    <li>
                        <a href="#transformations">Transformations</a>
                    </li>
                </ul>
            </nav>
        </header>

        <section id="calculator">
            <div class="page-title">Macro Calculator</div>
            <div class="page-subtitle">based on the Harris Benedict Formula</div>
            <div class="page-form">
                <h6>Gender</h6>
              <div class="male-female-row">
                <div class="radio-form-item"><button id="male" onClick="maleValue()" class="button" type="button">Female</button></div>
                <div class="radio-form-item"><button id="female" onClick="femaleValue()" class="button" type="button">Male</button></div>
              </div>
            
              <div id="ageV" class="value">
                <h7 class="input-form-items">
                  <span>Age</span>
                  <span><output class="bubble"></output></span>
                </h7>
                <div><input id="age" type="range" class="range" name="quantity" min="18" max="60"></div>
              </div>
              
              <div id="heightV" class="value">
                <h7 class="input-form-items">
                  <span>Height (cm)</span>
                  <span><output class="bubble"></output></span>
                </h7>
                <div><input id="height" type="range" class="range" min="130" max="230" value="180"></div>
              </div>
              
              <div id="weightV" class="value">
                <h7 class="input-form-items">
                  <span>Weight (kg)</span>
                  <span><output class="bubble"></output></span>
                </h7>
                <div><input id="weight" type="range" class="range" name="quantity" min="40" max="180"></div>
              </div>
              
                <div class="radio-form-item-1"><a href="#next"><button class="button-next" type="button">Next</button></a></div>
                
            </div>
          </div>
        </section>
        
        <section id="calculator">
          <div class="second-page-form" id="next">
            <h6>My activity level is...</h6>
            <div class="options">
              <button class="amount">
                <span class="details">Sedentary</span>
                <span class="sub-details">Little or no exercise</span>
              </button>
             </div>
          <div class="options">
              <button class="amount" id="lightly">
                <span class="details">Lightly active</span>
                <span class="sub-details">1-3 days a week</span>
              </button>
             </div>
          <div class="options">
              <button class="amount">
                <span class="details">Moderately active</span>
                <span class="sub-details">3-5 days a week</span>
              </button>
             </div>
          <div class="options">
              <button class="amount">
                <span class="details">Very active</span>
                <span class="sub-details">6-7 days a week</span>
              </button>
             </div>
          <div class="options">
              <button class="amount">
                <span class="details">Extra active</span>
                <span class="sub-details">Sports and physical job or 2x training</span>
              </button>
             </div>

          <div class="radio-form-item-1"><a href="#calculate"><button class="button-next" type="button">Calculate</button></a></div>
               
        </section>

        <section id="calculator">
          <div class="third-page-form" id="calculate">
            <h6>Your Protein & Calories</h6>
       
            <div class="output">
                <div class="results">
                  <span>Protein target</span>
                  <p id="protein"><p>
                </div>
                <div class="results0">
                  <span>Calories target</span>
                  <p id="calorie"><p>
                </div>
            </div>
        </section>

        <script src="Webpage_Functionality.js"></script>
    </body>
</html>
